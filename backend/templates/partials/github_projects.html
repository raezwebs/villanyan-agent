<div id="github-projects-list">
  {% if error %}
  <div class="text-center py-6">
    <div class="text-3xl mb-2">🐙</div>
    <div class="text-sm text-secondary">GitHub niedostępny: {{ error }}</div>
    <a href="/settings" class="inline-block mt-2 text-xs text-accent hover:underline">→ Ustawienia</a>
  </div>
  {% elif repos %}
    {% for r in repos %}
    <div class="flex items-start gap-3 py-2.5 border-b border-border-custom last:border-0">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-secondary shrink-0 mt-1"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium truncate">{{ r.name }}</span>
        </div>
        <div class="text-xs text-secondary truncate mt-0.5">{{ r.description or 'Brak opisu' }}</div>
        <div class="text-[10px] text-secondary/60 mt-0.5">
          {% if r.pushedAt %}ostatni push: {{ r.pushedAt[:10] }}{% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  {% else %}
  <div class="text-center py-6">
    <div class="text-3xl mb-2">📦</div>
    <div class="text-sm text-secondary">Brak publicznych repozytoriów</div>
  </div>
  {% endif %}
</div>
