<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-secondary text-xs uppercase tracking-wider border-b border-border-custom">
        <th class="text-left py-3 px-4">Port</th>
        <th class="text-left py-3 px-4">Protokół</th>
        <th class="text-left py-3 px-4 hidden md:table-cell">Adres</th>
        <th class="text-left py-3 px-4">Proces</th>
      </tr>
    </thead>
    <tbody id="port-table-body">
    </tbody>
  </table>
</div>
<script>
(async function() {
  const tbody = document.getElementById('port-table-body');
  try {
    const res = await fetch('/api/network/ports', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') }
    });
    if (!res.ok) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-8">Brak dostępu</td></tr>'; return; }
    const data = await res.json();
    const allPorts = [...(data.tcp || []), ...(data.udp || [])];
    if (allPorts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary py-8">Brak nasłuchujących portów</td></tr>';
      return;
    }
    allPorts.sort((a, b) => a.port - b.port);
    for (const p of allPorts) {
      tbody.innerHTML += '<tr>' +
        '<td class="py-2 px-4 font-mono font-bold">' + p.port + '</td>' +
        '<td class="py-2 px-4"><span class="text-xs px-2 py-0.5 rounded-full ' + (p.protocol === 'tcp' ? 'bg-accent/10 text-accent' : 'bg-warning/10 text-warning') + '">' + p.protocol.toUpperCase() + '</span></td>' +
        '<td class="py-2 px-4 hidden md:table-cell text-xs text-secondary font-mono">' + (p.local || '-') + '</td>' +
        '<td class="py-2 px-4 text-xs text-secondary">' + (p.process || '-') + '</td></tr>';
    }
  } catch { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-8">Błąd połączenia</td></tr>'; }
})();
</script>
