<div class="grid grid-cols-2 gap-4" id="reminder-stats-inner">
</div>
<script>
(async function() {
  const container = document.getElementById('reminder-stats-inner');
  try {
    const res = await fetch('/api/obsidian/reminders', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') }
    });
    if (!res.ok) { container.innerHTML = '<div class="text-center text-secondary py-4">-</div>'; return; }
    const data = await res.json();
    const total = data.reminders ? data.reminders.length : 0;
    const done = data.reminders ? data.reminders.filter(r => r.done).length : 0;
    container.innerHTML =
      '<div class="bg-surface border border-border-custom rounded-xl p-4 text-center"><div class="text-2xl font-black text-accent">' + total + '</div><div class="text-xs text-secondary mt-1">Wszystkie</div></div>' +
      '<div class="bg-surface border border-border-custom rounded-xl p-4 text-center"><div class="text-2xl font-black text-success">' + done + '</div><div class="text-xs text-secondary mt-1">Zrobione</div></div>';
  } catch {}
})();
</script>
