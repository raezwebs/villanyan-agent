{% extends "base.html" %}
{% block title %}Czat — Villanyan-Agent{% endblock %}
{% block content %}
<div class="flex h-full -m-6">
  {# Sidebar sesji #}
  <div class="hidden md:flex w-64 shrink-0 border-r border-border-custom bg-surface/50 flex-col">
    <div class="p-3 border-b border-border-custom">
      <button onclick="createSession()"
        class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-accent text-page rounded-lg font-bold text-sm hover:bg-accent/90 transition-colors">
        + Nowa konwersacja
      </button>
    </div>
    <div class="flex-1 overflow-y-auto" id="session-list"
         hx-get="/partials/session-list" hx-trigger="load, every 10s" hx-swap="innerHTML">
    </div>
  </div>

  {# Chat #}
  <div class="flex-1 flex flex-col min-w-0">
    <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4" id="chat-messages">
      <div class="flex flex-col items-center justify-center h-full text-secondary">
        <p class="text-sm">Wybierz konwersację lub utwórz nową</p>
        <p class="text-xs mt-1 opacity-60">Villanyan — VILLANYAN Personal Agent</p>
      </div>
    </div>

    <div class="border-t border-border-custom p-3 md:p-4 bg-surface/30">
      <div class="flex items-end gap-2 max-w-4xl mx-auto">
        <div class="flex-1 relative">
          <textarea id="chat-input" rows="1"
            placeholder="Napisz wiadomość..."
            class="w-full bg-surface border border-border-custom rounded-xl px-4 py-3 text-sm text-primary placeholder-secondary/50 resize-none outline-none focus:border-accent/50 transition-all"
            style="min-height:44px;max-height:150px"></textarea>
        </div>
        <button id="chat-send" class="p-3 bg-accent text-page rounded-xl hover:bg-accent/90 transition-all disabled:opacity-30 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let activeSession = null;
let sending = false;
let pollInterval = null;

document.getElementById('chat-send').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  setTimeout(() => {
    const el = document.getElementById('chat-input');
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
  }, 0);
});

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || sending) return;
  if (!activeSession) {
    const sid = await createSession();
    if (!sid) return;
  }
  sending = true;
  input.value = '';
  addMessage('user', text);
  try {
    const res = await fetch('/api/sessions/' + activeSession + '/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) throw new Error('Send failed');
    startPolling();
  } catch { addError('Błąd wysyłania'); sending = false; }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  const start = Date.now();
  pollInterval = setInterval(async () => {
    if (Date.now() - start > 60000) { clearInterval(pollInterval); sending = false; return; }
    const msgs = await fetchMessages(activeSession);
    if (msgs && msgs.length > 0) {
      updateMessages(msgs);
      const last = msgs[msgs.length - 1];
      if (last.role === 'assistant') { clearInterval(pollInterval); sending = false; }
    }
  }, 2000);
}

async function fetchMessages(sessionId) {
  try {
    const res = await fetch('/api/sessions/' + sessionId + '/messages');
    const data = await res.json();
    return data.messages || [];
  } catch { return []; }
}

function addMessage(role, content) {
  const el = document.getElementById('chat-messages');
  el.innerHTML += '<div class="flex ' + (role === 'user' ? 'justify-end' : 'justify-start') + '">' +
    '<div class="max-w-[80%] ' + (role === 'user' ? 'bg-accent text-page rounded-2xl rounded-br-md' : 'bg-surface border border-border-custom rounded-2xl rounded-bl-md') + ' px-4 py-2">' +
    '<div class="text-sm leading-relaxed whitespace-pre-wrap break-words">' + escapeHtml(content) + '</div></div></div>';
  el.scrollTop = el.scrollHeight;
}

function updateMessages(msgs) {
  const el = document.getElementById('chat-messages');
  el.innerHTML = '';
  for (const m of msgs) {
    el.innerHTML += '<div class="flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start') + '">' +
      '<div class="max-w-[80%] ' + (m.role === 'user' ? 'bg-accent text-page rounded-2xl rounded-br-md' : 'bg-surface border border-border-custom rounded-2xl rounded-bl-md') + ' px-4 py-2">' +
      '<div class="text-sm leading-relaxed whitespace-pre-wrap break-words">' + escapeHtml(m.content || '') + '</div></div></div>';
  }
  el.scrollTop = el.scrollHeight;
}

function addError(msg) {
  document.getElementById('chat-messages').innerHTML +=
    '<div class="text-center"><span class="text-xs text-danger bg-danger/10 px-3 py-1 rounded-full">' + msg + '</span></div>';
}

async function createSession() {
  try {
    const res = await fetch('/api/sessions', { method: 'POST' });
    if (!res.ok) return null;
    const data = await res.json();
    activeSession = data.id;
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('session-list').setAttribute('hx-trigger', 'load');
    htmx.process(document.getElementById('session-list'));
    return data.id;
  } catch { return null; }
}

function selectSession(sid) {
  activeSession = sid;
  loadMessages(sid);
}

async function loadMessages(sessionId) {
  const msgs = await fetchMessages(sessionId);
  updateMessages(msgs);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
{% endblock %}
