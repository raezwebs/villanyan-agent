{% extends "base.html" %}
{% block title %}Automatyzacje — Villanyan-Agent{% endblock %}
{% block content %}
<div class="space-y-8">

  {# Hermes Crony #}
  <div>
    <h2 class="text-2xl font-bold mb-2">🤖 Hermes Automatyzacje</h2>
    <p class="text-sm text-secondary mb-4">Crony zdefiniowane w Hermes Agent</p>
    <div id="cron-table" hx-get="/partials/cron-table" hx-trigger="load, every 30s" hx-swap="innerHTML">
      <div class="space-y-2">
        <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
        <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
      </div>
    </div>
  </div>

  {# Villanyan Crony #}
  <div>
    <h2 class="text-2xl font-bold mb-2">⬡ Villanyan Automatyzacje</h2>
    <p class="text-sm text-secondary mb-4">Zadania dodane przez dashboard villanyan</p>

    <div id="cron-table-villanyan" hx-get="/partials/cron-table-villanyan" hx-trigger="load, every 30s" hx-swap="innerHTML">
      <div class="space-y-2">
        <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
        <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
