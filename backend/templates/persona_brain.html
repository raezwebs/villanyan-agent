{% extends "base.html" %}
{% block title %}Mózg Persony — Villanyan-Agent{% endblock %}
{% block content %}
<div class="space-y-6">
  <div class="flex justify-between items-center">
    <div>
      <h2 class="text-2xl font-bold">Mózg Persony</h2>
      <p class="text-sm text-secondary">Pliki determinujące osobowość i wiedzę agenta Hermes</p>
    </div>
    <div class="flex gap-2">
      <a href="/persona" class="bg-surface border border-border-custom px-4 py-2 rounded-lg text-sm font-bold hover:bg-surface-hover transition-colors flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Odśwież
      </a>
    </div>
  </div>

  {# Główna zawartość — HTMX server-render #}
  <div id="persona-brain" hx-get="/partials/persona-files{% if selected_file %}?file={{ selected_file }}{% endif %}" hx-trigger="load" hx-swap="innerHTML">
    <div class="animate-pulse space-y-4">
      <div class="h-20 bg-surface-hover rounded-xl"></div>
      <div class="flex gap-2">
        <div class="h-10 bg-surface-hover rounded-lg w-24"></div>
        <div class="h-10 bg-surface-hover rounded-lg w-24"></div>
        <div class="h-10 bg-surface-hover rounded-lg w-24"></div>
      </div>
      <div class="h-96 bg-surface-hover rounded-xl"></div>
    </div>
  </div>
</div>
{% endblock %}
