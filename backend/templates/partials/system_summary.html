<div id="system-summary" class="space-y-2 text-sm">
  <div class="flex justify-between py-1.5 border-b border-border-custom/50">
    <span class="text-secondary">⏱ Uptime</span>
    <span class="font-mono font-medium">{{ uptime }}</span>
  </div>
  <div class="flex justify-between py-1.5 border-b border-border-custom/50">
    <span class="text-secondary">🌡 Temperatura</span>
    <span class="font-mono font-medium">{{ temp }}</span>
  </div>
  <div class="flex justify-between py-1.5">
    <span class="text-secondary">📔 Obsidian</span>
    <span class="font-mono font-medium">{% if obsidian_ok %}✅ Connected{% else %}✗ Niedostępny{% endif %}</span>
  </div>
  <a href="/live" class="mt-3 inline-block text-xs text-accent hover:underline">→ szczegóły na /live</a>
</div>
