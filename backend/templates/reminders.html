{% extends "base.html" %}
{% block title %}Przypomnienia — Villanyan-Agent{% endblock %}
{% block content %}
<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold">Przypomnienia</h2>
    <div class="flex gap-3">
      <button onclick="showAddReminder()" class="bg-accent text-page px-4 py-2 rounded-lg font-bold text-sm hover:bg-accent/90 transition-colors">+ Dodaj</button>
    </div>
  </div>

  {# Statystyki #}
  <div class="grid grid-cols-2 gap-4" id="reminder-stats"
       hx-get="/partials/reminder-stats" hx-trigger="load, every 30s" hx-swap="innerHTML">
  </div>

  {# Formularz #}
  <div id="reminder-form" class="bg-surface border border-accent rounded-xl p-5 hidden">
    <h3 class="font-bold mb-4">Nowe Przypomnienie</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="md:col-span-2">
        <label class="block text-xs text-secondary mb-1">Treść</label>
        <input type="text" id="reminder-text" class="w-full bg-page border border-border-custom rounded-lg p-2 text-sm focus:border-accent outline-none" />
      </div>
      <div>
        <label class="block text-xs text-secondary mb-1">Termin</label>
        <input type="text" id="reminder-due" class="w-full bg-page border border-border-custom rounded-lg p-2 text-sm focus:border-accent outline-none" placeholder="Jutro o 15:00" />
      </div>
    </div>
    <button onclick="saveReminder()" class="bg-accent text-page px-4 py-2 rounded-lg font-bold text-sm hover:bg-accent/90 transition-colors">Dodaj</button>
  </div>

  {# Lista #}
  <div id="reminder-list" hx-get="/partials/reminder-list" hx-trigger="load, every 30s" hx-swap="innerHTML">
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function showAddReminder() { document.getElementById('reminder-form').classList.remove('hidden'); }
async function saveReminder() {
  const text = document.getElementById('reminder-text').value.trim();
  const due = document.getElementById('reminder-due').value.trim();
  if (!text) return;
  await fetch('/api/obsidian/reminders', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') }, body: JSON.stringify({ text, due }) });
  document.getElementById('reminder-text').value = '';
  document.getElementById('reminder-due').value = '';
  document.getElementById('reminder-form').classList.add('hidden');
  htmx.trigger('#reminder-list', 'load');
  htmx.trigger('#reminder-stats', 'load');
}
async function toggleReminder(id) {
  await fetch('/api/obsidian/reminders/' + id + '/toggle', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') } });
  htmx.trigger('#reminder-list', 'load');
  htmx.trigger('#reminder-stats', 'load');
}
async function deleteReminder(id) {
  if (!confirm('Usunąć?')) return;
  await fetch('/api/obsidian/reminders/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') } });
  htmx.trigger('#reminder-list', 'load');
  htmx.trigger('#reminder-stats', 'load');
}
</script>
{% endblock %}
