<div id="dashboard-summary" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  {# Cloudilla #}
  <div class="bg-surface border border-border-custom rounded-xl p-5">
    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-accent"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
      cloudilla
      <span class="text-xs text-secondary/60 font-normal">({{ cloud_count }} plików)</span>
    </h2>
    <div hx-get="/partials/cloud-files" hx-trigger="load" hx-swap="innerHTML">
      <div class="animate-pulse space-y-2">
        <div class="h-8 bg-surface-hover rounded-lg"></div>
        <div class="h-8 bg-surface-hover rounded-lg w-3/4"></div>
        <div class="h-8 bg-surface-hover rounded-lg w-1/2"></div>
      </div>
    </div>
  </div>

  {# Docker #}
  <div class="bg-surface border border-border-custom rounded-xl p-5">
    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-accent"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/></svg>
      Docker
    </h2>
    {{ docker_html|safe }}
    <a href="/live" class="mt-3 inline-block text-xs text-accent hover:underline">→ wszystkie kontenery i porty</a>
  </div>

  {# System RPi #}
  <div class="bg-surface border border-border-custom rounded-xl p-5">
    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-accent"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      System RPi
    </h2>
    <div class="space-y-2 text-sm">
      <div class="flex justify-between py-1.5 border-b border-border-custom/50">
        <span class="text-secondary">⏱ Uptime</span>
        <span class="font-mono font-medium">{{ uptime }}</span>
      </div>
      <div class="flex justify-between py-1.5 border-b border-border-custom/50">
        <span class="text-secondary">🌡 Temp</span>
        <span class="font-mono font-medium">{{ temp }}</span>
      </div>
      <div class="flex justify-between py-1.5 border-b border-border-custom/50">
        <span class="text-secondary">📔 Obsidian</span>
        <span class="font-mono font-medium">{{ obsidian_ok }} {{ obsidian_path }}</span>
      </div>
      <div class="flex justify-between py-1.5">
        <span class="text-secondary">📌 Commit</span>
        <span class="font-mono text-xs text-accent truncate max-w-[180px]">{{ commit }}</span>
      </div>
    </div>
    <a href="/live" class="mt-3 inline-block text-xs text-accent hover:underline">→ szczegóły /live</a>
  </div>
</div>
