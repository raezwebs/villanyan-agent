{% extends "base.html" %}
{% block title %}Automatyzacje — Villanyan-Agent{% endblock %}
{% block content %}
<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold">Automatyzacje i Crony</h2>
    <button onclick="showAddCron()" class="bg-accent text-page px-4 py-2 rounded-lg font-bold text-sm hover:bg-accent/90 transition-colors flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      + Dodaj Automatyzację
    </button>
  </div>

  {# Formularz dodawania #}
  <div id="cron-form" class="bg-surface border border-accent rounded-xl p-5 hidden">
    <h3 class="font-bold mb-4">Nowa Automatyzacja</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs text-secondary mb-1">Nazwa zadania</label>
        <input type="text" id="cron-name" class="w-full bg-page border border-border-custom rounded-lg p-2 text-sm focus:border-accent outline-none" placeholder="Moja automatyzacja" />
      </div>
      <div>
        <label class="block text-xs text-secondary mb-1">Wyrażenie Cron</label>
        <input type="text" id="cron-schedule" class="w-full bg-page border border-border-custom rounded-lg p-2 text-sm font-mono focus:border-accent outline-none" placeholder="0 9 * * *" />
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs text-secondary mb-1">Polecenie</label>
        <input type="text" id="cron-command" class="w-full bg-page border border-border-custom rounded-lg p-2 text-sm font-mono focus:border-accent outline-none" placeholder="/home/vv-rp/scripts/backup.sh" />
      </div>
    </div>
    <button onclick="saveCron()" class="bg-accent text-page px-4 py-2 rounded-lg font-bold text-sm hover:bg-accent/90 transition-colors">
      <span id="cron-save-text">Zapisz</span>
      <span id="cron-save-spinner" class="hidden"><span class="w-3 h-3 border-2 border-page border-t-transparent rounded-full animate-spin inline-block"></span> Zapisywanie...</span>
    </button>
    <span id="cron-form-msg" class="text-sm ml-3"></span>
  </div>

  {# Tabela #}
  <div id="cron-table" hx-get="/partials/cron-table" hx-trigger="load, every 30s" hx-swap="innerHTML">
    <div class="space-y-2">
      <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
      <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
      <div class="h-12 bg-surface-hover rounded-lg animate-pulse"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let editingId = null;

function showAddCron() {
  document.getElementById('cron-form').classList.remove('hidden');
  document.getElementById('cron-form-msg').textContent = '';
}
function hideAddCron() {
  document.getElementById('cron-form').classList.add('hidden');
  editingId = null;
  document.getElementById('cron-name').value = '';
  document.getElementById('cron-schedule').value = '';
  document.getElementById('cron-command').value = '';
  document.getElementById('cron-form-msg').textContent = '';
}

async function saveCron() {
  const name = document.getElementById('cron-name').value.trim();
  const schedule = document.getElementById('cron-schedule').value.trim();
  const command = document.getElementById('cron-command').value.trim();
  const msgEl = document.getElementById('cron-form-msg');
  const btnText = document.getElementById('cron-save-text');
  const btnSpin = document.getElementById('cron-save-spinner');
  if (!name || !schedule || !command) { msgEl.textContent = '✗ Wypełnij wszystkie pola'; return; }
  btnText.classList.add('hidden');
  btnSpin.classList.remove('hidden');
  msgEl.textContent = '';
  const url = '/api/cron/jobs';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') },
      body: JSON.stringify({ name, schedule, command })
    });
    if (res.ok) {
      msgEl.textContent = '✓ Dodano';
      msgEl.className = 'text-sm ml-3 text-success';
      hideAddCron();
      htmx.trigger('#cron-table', 'load');
    } else {
      const err = await res.json().catch(() => ({}));
      msgEl.textContent = '✗ ' + (err.detail || 'Błąd');
      msgEl.className = 'text-sm ml-3 text-danger';
    }
  } catch {
    msgEl.textContent = '✗ Błąd sieci';
    msgEl.className = 'text-sm ml-3 text-danger';
  }
  btnText.classList.remove('hidden');
  btnSpin.classList.add('hidden');
}

async function runCron(id) {
  const el = document.querySelector('[onclick="runCron(' + id + ')"]');
  if (el) { el.textContent = '⋯'; el.disabled = true; }
  try {
    await fetch('/api/cron/jobs/' + id + '/run', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') }
    });
  } catch {}
  htmx.trigger('#cron-table', 'load');
}

async function deleteCron(id) {
  if (!confirm('Na pewno usunąć?')) return;
  try {
    await fetch('/api/cron/jobs/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('villanyan_token') }
    });
  } catch {}
  htmx.trigger('#cron-table', 'load');
}
</script>
{% endblock %}
