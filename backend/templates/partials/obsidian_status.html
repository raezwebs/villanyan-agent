<div id="obsidian-status">
  {% if vault_ok %}
  <div class="bg-surface border border-border-custom rounded-xl p-4">
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs text-secondary">Obsidian Vault</span>
      <span class="px-2 py-0.5 text-xs rounded-full bg-success/10 text-success">Connected</span>
    </div>
    <div class="text-xs text-secondary space-y-1">
      <div class="flex justify-between"><span>Path:</span><span class="text-primary truncate ml-2 max-w-[200px]">{{ vault_path }}</span></div>
      <div class="flex justify-between"><span>Notatki:</span><span class="text-primary">{{ note_count }} plików .md</span></div>
      <div class="flex justify-between"><span>Reminders file:</span><span class="text-primary">{% if reminders_ok %}✓ istnieje{% else %}✗ brak{% endif %}</span></div>
    </div>
  </div>
  {% else %}
  <div class="bg-surface border border-border-custom rounded-xl p-4 text-center">
    <div class="text-2xl mb-1">📔</div>
    <div class="text-xs text-secondary">Obsidian Vault niedostępny — sprawdź ścieżkę w .env</div>
  </div>
  {% endif %}
</div>
